name: live2text CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  GOLANG_VERSION: '1.24.3'
  ACTIONS_STEP_DEBUG: true

concurrency:
  cancel-in-progress: true
  group: ${{ github.ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      myhub: ${{ steps.print.outputs.myhub }}
      envi: ${{ steps.print.outputs.envi }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "^${{ env.GOLANG_VERSION }}"

      - name: Print Go version
        id: print
        run: | 
          go version
          echo "envi=hello" >> "$GITHUB_OUTPUT"
          echo "myhub=\"$(echo '${{ toJSON(github) }}' | sed '5!d' | base64 -w0)\""
          echo "myhub=\"$(echo '${{ toJSON(github) }}' | sed '5!d' | base64 -w0)\"" >> "$GITHUB_OUTPUT"

  use-output:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: |
          echo "myhub: ${{ needs.build.outputs.myhub }}"
          echo "HUB: $HUB"
          echo "ENVI: $ENVI"
          echo "envi: ${{needs.build.outputs.envi}}"
        env:
          HUB: ${{needs.build.outputs.myhub}}
          ENVI: ${{needs.build.outputs.envi}}

