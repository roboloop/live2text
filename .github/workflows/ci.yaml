name: live2text CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  GOLANG_VERSION: '1.24.2'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: "^${{ env.GOLANG_VERSION }}"

      - name: Print Go version
        run: go version

